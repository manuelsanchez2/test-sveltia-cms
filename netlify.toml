[build]
  command = "pnpm build"
  publish = "build"

# Produktion: der `main`-Branch. Die Praxis bearbeitet Inhalte im CMS (/admin);
# jede Änderung wird direkt nach `main` committet und automatisch live gestellt
# (siehe static/admin/config.yml).
[context.production]
  command = "pnpm build"

# /admin soll nicht von Suchmaschinen indexiert werden.
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex"
